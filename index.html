<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Streamline</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>

    <!-- Auth overlay (visible until logged in) -->
    <div id="auth-overlay">
      <div id="auth-container">
        <h1 id="auth-title">Streamline</h1>
        <div id="auth-tabs">
          <button id="tab-signin" class="auth-tab active">Sign In</button>
          <button id="tab-signup" class="auth-tab">Sign Up</button>
        </div>
        <form id="auth-form">
          <input type="email" id="auth-email" placeholder="Email" autocomplete="email" required />
          <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" minlength="6" required />
          <input type="password" id="auth-confirm-password" placeholder="Confirm Password" autocomplete="new-password" minlength="6" class="hidden" />
          <p id="auth-message" class="hidden"></p>
          <button type="submit" id="auth-submit-btn">Sign In</button>
        </form>
      </div>
    </div>

    <div class="app-layout hidden" id="app-layout">

      <aside id="sidebar">
        <div id="now-playing">
          <p id="player-title">No song playing</p>
          <p id="player-artist"></p>
        </div>
        <input type="range" id="progress-bar" value="0" min="0" step="1" />
        <div id="player-controls">
          <button id="play-pause-btn" tabindex="1">Play</button>
          <button id="skip-btn" tabindex="2">Skip</button>
        </div>
        <div id="lyrics-section">
          <button id="lyrics-toggle-btn" tabindex="3">Show Lyrics</button>
          <div id="lyrics-panel">
            <button id="lyrics-close-btn">Close</button>
            <div id="lyrics-content"></div>
          </div>
        </div>
      </aside>

      <div class="main">

        <header id="top-bar">
          <button id="logo-btn" tabindex="4">Streamline</button>
          <button id="back-btn" tabindex="5">Back</button>
          <input type="text" id="search-input" tabindex="6" placeholder="Search songs..." />
          <button id="search-btn" tabindex="7">Search</button>
          <span id="user-email"></span>
          <button id="logout-btn">Logout</button>
          <button id="delete-account-btn">Delete Account</button>
        </header>

        <main id="content">

          <!-- Home view -->
          <div id="view-home" class="view">
            <div id="home-actions">
              <button id="create-playlist-btn" tabindex="8">New Playlist</button>
              <button id="add-song-btn" tabindex="9">Add Song</button>
            </div>
            <div id="playlist-grid"></div>
          </div>

          <!-- Playlist view -->
          <div id="view-playlist" class="view hidden">
            <h1 id="playlist-title"></h1>
            <button id="delete-playlist-btn">Delete Playlist</button>
            <input type="text" id="playlist-search-input" placeholder="Search this playlist..." />
            <ul id="playlist-song-list"></ul>
          </div>

          <!-- Search results view -->
          <div id="view-search" class="view hidden">
            <ul id="search-results-list"></ul>
          </div>

        </main>
      </div>
    </div>

    <!-- Add Song Modal -->
    <div id="add-song-modal" class="hidden">
      <div id="modal-content">
        <h2>Add Song</h2>
        <input type="file" id="song-file" accept="audio/*" />
        <input type="text" id="song-title" placeholder="Title *" />
        <input type="text" id="song-artist" placeholder="Artist" />
        <input type="text" id="song-album" placeholder="Album" />
        <textarea id="song-lyrics" placeholder="Lyrics"></textarea>
        <div id="modal-actions">
          <button id="modal-cancel-btn">Cancel</button>
          <button id="modal-submit-btn">Upload</button>
        </div>
      </div>
    </div>

    <audio id="audio-player"></audio>

    <script src="js/storage.js"></script>
    <script src="js/player.js"></script>
    <script src="js/search.js"></script>
    <script src="js/playlist.js"></script>
    <script src="js/lyrics.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
